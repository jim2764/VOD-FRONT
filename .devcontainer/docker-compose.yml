version: '3.8'
name: vod-front
services:
  app:
    container_name: front-app
    init: true
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      TZ: Asia/Taipei
    volumes:
      - ..:/workspaces/vod-front:cached
    networks:
      - vod-net
    command: ["sleep", "infinity"]

  nginx:
    image: nginx:stable
    container_name: vod-nginx
    environment:
      TZ: Asia/Taipei
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - vod-net
    depends_on:
      - app

networks:
  vod-net:
    external: true
    name: vod-net